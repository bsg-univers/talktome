<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- App-like viewport on mobile (important for Android + notch safe areas) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5b4b4f" />
  <title>Speech Notes</title>

  <!-- PWA (GitHub Pages-safe relative path) -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    :root {
      --bg:#f6eaf4;
      --btn:#5b4b4f;
      --btnDisabled:#a79aa0;
      --border:#4d3f43;
      --text:#3b2d31;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    /* Main app container */
    .wrap {
      max-width: 750px;
      margin: 0 auto;

      height: 100dvh;                   /* correct visible height on mobile */
      height: 100vh;                    /* fallback */

      display: flex;
      flex-direction: column;
      gap: 8px;

      padding: calc(10px + env(safe-area-inset-top))
               calc(10px + env(safe-area-inset-right))
               calc(10px + env(safe-area-inset-bottom))
               calc(10px + env(safe-area-inset-left));

      box-sizing: border-box;
      min-height: 0;
    }

    /* Allow flex children to shrink properly */
    .wrap > * { min-height: 0; }

    .row { display:flex; gap:10px; }

    /* Language select */
    #lang{
      width:100%;
      padding:10px;
      border:1.5px solid var(--border);
      border-radius:10px;
      font-size:14px;
      background:#fff;
      box-sizing:border-box;
    }

    /* Compact buttons */
    button {
      flex: 1;
      padding: 10px 10px;
      border: 2px solid var(--border);
      background: var(--btn);
      color: #fff;

      font-weight: 400;
      letter-spacing: .4px;

      border-radius: 8px;
      cursor: pointer;

      font-size: 14px;
      line-height: 1.1;

      min-height: 40px;

      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button[disabled] {
      background: var(--btnDisabled);
      cursor: not-allowed;
      opacity: .55;
    }

    .row.single button { flex:1; }

    .status {
      margin: 0 2px;
      font-size: 13px;
      line-height: 1.2;
    }

    /* Text area fills remaining space */
    .box {
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      position: relative;

      flex: 1 1 auto;
      min-height: 0;

      display: flex;
      flex-direction: column;
    }

    .boxHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;

      padding: 10px 12px;
      background: var(--btn);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;

      flex: 0 0 auto;
    }

    .boxHeader small { opacity: .85; font-weight: 600; }

    textarea{
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;

      resize: none;
      border: 0;
      outline: 0;

      padding: 12px;
      font-size: 17px;
      line-height: 1.45;

      overflow: auto;
      box-sizing: border-box;

      -webkit-overflow-scrolling: touch;
    }
textarea {
  -webkit-text-size-adjust: 100%;
}

textarea::-webkit-spellcheck-marker {
  display: none;
}

#emptyState img {
  width: 120px;
  height: auto;
  opacity: 0.9;
  user-select: none;
  -webkit-user-drag: none;
}

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .row { gap: 8px; }
      button {
        min-height: 36px;
        font-size: 13px;
        padding: 9px 8px;
        border-radius: 10px;
      }
      #lang {
        padding: 9px;
        font-size: 13px;
        border-radius: 10px;
      }
      textarea {
        font-size: 16px;
        padding: 10px;
      }
    }
    .box { position: relative; } /* add this if not already */

#emptyState{
  position:absolute;
  top:52px;
  left:0;
  right:0;
  bottom:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;

  pointer-events:none;
  opacity:0.9;
  z-index:2;
}

#emptyState img{
  width: 120px;
  height: auto;
  opacity: 0.9;
}

#emptyState .emptyText{
  font-size: 14px;
  color: rgba(59,45,49,0.85); /* your theme text */
}

/* Special style for PLAY button */
#playBtn {
  background: white;   /* same pink as app background */
  color: var(--btn);       /* brown text */
  border: 1.5px solid var(--border);
  font-weight: 600;
}

/* Optional: slightly darker on press */
#playBtn:active {
  filter: brightness(0.97);
}


  </style>
</head>

<body>
  <div class="wrap">
    <div class="row">
      <select id="lang">
        <option value="fr-FR">Français</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="es-ES">Español</option>
        <option value="de-DE">Deutsch</option>
        <option value="pt-PT">Português</option>
        <option value="it-IT">Italiano</option>
        <option value="uk-UA">Українська</option>
        <option value="ga-IE">Gaeilge (Irish)</option>
        <option value="tr-TR">Türkçe</option>
        <option value="da-DK">Dansk</option>
        <option value="nl-NL">Nederlands</option>
        <option value="nb-NO">Norsk</option>
        <option value="fi-FI">Suomi</option>
        <option value="pl-PL">Polski</option>
        <option value="cs-CZ">Čeština</option>
        <option value="ja-JP">日本語</option>
        <option value="zh-CN">中文 (简体)</option>
        <option value="vi-VN">Tiếng Việt</option>
        <option value="ko-KR">한국어</option> 
        <option value="ar-SA">العربية</option>
        <option value="ro-RO">Română</option>
        <option value="ru-RU">Русский</option>
      </select>
    </div>

    <div class="row">
      <button id="startBtn">START</button>
      <button id="stopBtn">STOP</button>
    </div>

    <div class="row single">
      <button id="playBtn">PLAY</button>
    </div>

    <div class="row">
      <button id="pauseBtn">PAUSE</button>
      <button id="resumeBtn">RESUME</button>
    </div>

    <div class="status" id="status">ᓚᘏᗢ</div>

    <div class="box">
  <div class="boxHeader" id="editToggle">
    <span>✎</span>
    <small id="editState">OFF</small>
  </div>

  <!-- Empty state overlay -->
  <div id="emptyState" aria-hidden="true">
    <img src="./micro.png" alt="" draggable="false" />
    <div class="emptyText">Your speech blooms here</div>
  </div>

  <textarea 
    id="text" 
    readonly
    spellcheck="false"
    autocorrect="off"
    autocomplete="off"
    autocapitalize="off"
  ></textarea>
</div>

  </div>

<script>
(() => {
  const langEl = document.getElementById('lang');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const playBtn = document.getElementById('playBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resumeBtn = document.getElementById('resumeBtn');
  const statusEl = document.getElementById('status');
  const textEl = document.getElementById('text');
  const emptyStateEl = document.getElementById('emptyState');
  
  let committedText = "";
  let interimText = "";
  let hasStarted = false;

  let recState = "idle";
  let manualEnd = false;

  let lastFinalCanonTokens = [];

  let ignoreFirstResult = false;
  let justResumedAt = 0;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;

  function updateEmptyState() {
  const hasText = normalize(textEl.value).length > 0;

  const show = !hasStarted && !hasText && textEl.readOnly;

  emptyStateEl.style.display = show ? "flex" : "none";
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function normalize(s) {
    return (s || "").replace(/\s+/g, " ").trim();
  }

  function rawTokens(s) {
    return (s || "").trim().split(/\s+/).filter(Boolean);
  }

  function canonToken(t) {
    return (t || "")
      .normalize("NFD")
      .replace(/\p{Diacritic}/gu, "")
      .toLowerCase()
      .replace(/[^\p{L}\p{N}]+/gu, "");
  }

  function canonTokensFromText(s) {
    return rawTokens(s).map(canonToken).filter(Boolean);
  }

  function overlapTokenCount(full, next) {
    const max = Math.min(full.length, next.length);
    for (let k = max; k > 0; k--) {
      let ok = true;
      for (let i = 0; i < k; i++) {
        if (full[full.length - k + i] !== next[i]) { ok = false; break; }
      }
      if (ok) return k;
    }
    return 0;
  }

  function ensureSpace(base) {
    return base.length > 0 && !/\s$/.test(base) ? " " : "";
  }

  function renderTranscript() {
    textEl.value = (committedText + interimText).trimStart();
    updateEmptyState(); // ✅ AJOUT IMPORTANT
  }

  function appendDeltaFromFinal(finalTextRaw) {
    const finalText = normalize(finalTextRaw);
    if (!finalText) return;

    const newTokens = canonTokensFromText(finalText);
    const prevTokens = lastFinalCanonTokens;

    const overlap = overlapTokenCount(prevTokens, newTokens);
    const deltaTokens = newTokens.slice(overlap);

    if (deltaTokens.length > 0) {
      const deltaText = rawTokens(finalText).slice(overlap).join(" ");
      committedText += ensureSpace(committedText) + deltaText;
    }

    lastFinalCanonTokens = newTokens;
  }

  function ensureRecognition() {
    if (!SpeechRecognition) return null;
    if (recog) return recog;

    recog = new SpeechRecognition();
    recog.lang = langEl.value;

    // ⚠️ plus stable sur Android
    recog.continuous = false;
    recog.interimResults = true;

    recog.onresult = (event) => {
      if (recState !== "listening") return;

      const now = Date.now();

      // 🔥 Ignore les premiers ms après resume
      if (ignoreFirstResult && now - justResumedAt < 300) return;
      ignoreFirstResult = false;

      let interim = "";

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const r = event.results[i];
        const t = r[0]?.transcript ?? "";
        if (!t) continue;

        if (r.isFinal) appendDeltaFromFinal(t);
        else interim += t;
      }

      interimText = interim;
      renderTranscript();
    };

    recog.onend = () => {
      if (recState === "listening" && !manualEnd) {
        setTimeout(() => {
          try { recog.start(); } catch (_) {}
        }, 120);
      }
      manualEnd = false;
    };

    recog.onerror = (e) => {
      setStatus("Error: " + e.error);
    };

    return recog;
  }

  function startRecognition({ clear }) {
    const r = ensureRecognition();
    if (!r) return;

    r.lang = langEl.value;

    if (clear) {
      committedText = "";
      interimText = "";
      lastFinalCanonTokens = [];
      renderTranscript();
    } else {
      if (committedText && !/\s$/.test(committedText)) {
        committedText += " ";
      }
    }

    lastFinalCanonTokens = [];

    // 🔥 protection premier mot
    ignoreFirstResult = true;
    justResumedAt = Date.now();

    recState = "listening";
    manualEnd = false;

    setStatus("Listening…");

    try { r.start(); } catch (_) {}
  }

  function pauseRecognition() {
    if (!recog) return;
  
    manualEnd = true;
    recState = "idle";
  
    // 🔥 IMPORTANT: sauver l'interim avant stop
    if (interimText.trim()) {
      committedText += ensureSpace(committedText) + normalize(interimText);
      interimText = "";
    }
  
    try { recog.stop(); } catch (_) {}
  
    renderTranscript();
  
    setStatus("Paused.");
  }

  function stopRecognition() {
    if (recog) {
      manualEnd = true;
      try { recog.stop(); } catch (_) {}
    }

    recState = "idle";
    committedText = "";
    interimText = "";
    lastFinalCanonTokens = [];

    renderTranscript();
    setStatus("⋆.˚ ☾⭒.˚");
  }

  startBtn.onclick = () => {
    hasStarted = true;
    updateEmptyState();
    startRecognition({ clear: true });
  };

  resumeBtn.onclick = () => {
    hasStarted = true;
    updateEmptyState();
  
    setTimeout(() => {
      startRecognition({ clear: false });
    }, 120);
  };

  pauseBtn.onclick = () => {
    hasStarted = true;
    updateEmptyState();
    pauseRecognition();
  };
  stopBtn.onclick = () => {
    hasStarted = false; // 🔥 reset uniquement ici
  
    stopRecognition();
    updateEmptyState();
  };

  // ---------- Edit toggle ----------
const editToggle = document.getElementById('editToggle');
const editState = document.getElementById('editState');

let editing = false;

editToggle.onclick = async () => {
  editing = !editing;

  if (editing) {
    // 🔥 stop dictée si active
    if (recState === "listening") {
      pauseRecognition();
    }

    textEl.readOnly = false;
    editState.textContent = "ON";

    requestAnimationFrame(() => {
      textEl.focus();
      textEl.setSelectionRange(textEl.value.length, textEl.value.length);
    });

  } else {
    textEl.blur();

    // 🔥 synchroniser texte édité
    committedText = textEl.value;
    interimText = "";
    lastFinalCanonTokens = [];

    textEl.readOnly = true;
    editState.textContent = "OFF";
  }

  updateEmptyState(); // 🔥 important pour ton micro
};
})();
</script>
</body>
</html>
