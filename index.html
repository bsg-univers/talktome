<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- App-like viewport on mobile (important for Android + notch safe areas) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5b4b4f" />
  <title>Speech Notes</title>

  <!-- PWA (GitHub Pages-safe relative path) -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    :root {
      --bg:#f6eaf4;
      --btn:#5b4b4f;
      --btnDisabled:#a79aa0;
      --border:#4d3f43;
      --text:#3b2d31;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    /* Main app container */
    .wrap {
      max-width: 750px;
      margin: 0 auto;

      height: 100dvh;                   /* correct visible height on mobile */
      height: 100vh;                    /* fallback */

      display: flex;
      flex-direction: column;
      gap: 8px;

      padding: calc(10px + env(safe-area-inset-top))
               calc(10px + env(safe-area-inset-right))
               calc(10px + env(safe-area-inset-bottom))
               calc(10px + env(safe-area-inset-left));

      box-sizing: border-box;
      min-height: 0;
    }

    /* Allow flex children to shrink properly */
    .wrap > * { min-height: 0; }

    .row { display:flex; gap:10px; }

    /* Language select */
    #lang{
      width:100%;
      padding:10px;
      border:1.5px solid var(--border);
      border-radius:10px;
      font-size:14px;
      background:#fff;
      box-sizing:border-box;
    }

    /* Compact buttons */
    button {
      flex: 1;
      padding: 10px 10px;
      border: 2px solid var(--border);
      background: var(--btn);
      color: #fff;

      font-weight: 400;
      letter-spacing: .4px;

      border-radius: 8px;
      cursor: pointer;

      font-size: 14px;
      line-height: 1.1;

      min-height: 40px;

      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button[disabled] {
      background: var(--btnDisabled);
      cursor: not-allowed;
      opacity: .55;
    }

    .row.single button { flex:1; }

    .status {
      margin: 0 2px;
      font-size: 13px;
      line-height: 1.2;
    }

    /* Text area fills remaining space */
    .box {
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      position: relative;

      flex: 1 1 auto;
      min-height: 0;

      display: flex;
      flex-direction: column;
    }

    .boxHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;

      padding: 10px 12px;
      background: var(--btn);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;

      flex: 0 0 auto;
    }

    .boxHeader small { opacity: .85; font-weight: 600; }

    textarea{
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;

      resize: none;
      border: 0;
      outline: 0;

      padding: 12px;
      font-size: 17px;
      line-height: 1.45;

      overflow: auto;
      box-sizing: border-box;

      -webkit-overflow-scrolling: touch;
    }
textarea {
  -webkit-text-size-adjust: 100%;
}

textarea::-webkit-spellcheck-marker {
  display: none;
}

#emptyState img {
  width: 120px;
  height: auto;
  opacity: 0.9;
  user-select: none;
  -webkit-user-drag: none;
}

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .row { gap: 8px; }
      button {
        min-height: 36px;
        font-size: 13px;
        padding: 9px 8px;
        border-radius: 10px;
      }
      #lang {
        padding: 9px;
        font-size: 13px;
        border-radius: 10px;
      }
      textarea {
        font-size: 16px;
        padding: 10px;
      }
    }
    .box { position: relative; } /* add this if not already */

#emptyState{
  position:absolute;
  top:52px;
  left:0;
  right:0;
  bottom:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;

  pointer-events:none;
  opacity:0.9;
  z-index:2;
}

#emptyState img{
  width: 120px;
  height: auto;
  opacity: 0.9;
}

#emptyState .emptyText{
  font-size: 14px;
  color: rgba(59,45,49,0.85); /* your theme text */
}

/* Special style for PLAY button */
#playBtn {
  background: white;   /* same pink as app background */
  color: var(--btn);       /* brown text */
  border: 1.5px solid var(--border);
  font-weight: 600;
}

/* Optional: slightly darker on press */
#playBtn:active {
  filter: brightness(0.97);
}


  </style>
</head>

<body>
  <div class="wrap">
    <div class="row">
      <select id="lang">
        <option value="fr-FR">Français</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="es-ES">Español</option>
        <option value="de-DE">Deutsch</option>
        <option value="pt-PT">Português</option>
        <option value="it-IT">Italiano</option>
        <option value="uk-UA">Українська</option>
        <option value="ga-IE">Gaeilge (Irish)</option>
        <option value="tr-TR">Türkçe</option>
        <option value="da-DK">Dansk</option>
        <option value="nl-NL">Nederlands</option>
        <option value="nb-NO">Norsk</option>
        <option value="fi-FI">Suomi</option>
        <option value="pl-PL">Polski</option>
        <option value="cs-CZ">Čeština</option>
        <option value="ja-JP">日本語</option>
        <option value="zh-CN">中文 (简体)</option>
        <option value="vi-VN">Tiếng Việt</option>
        <option value="ko-KR">한국어</option> 
        <option value="ar-SA">العربية</option>
        <option value="ro-RO">Română</option>
        <option value="ru-RU">Русский</option>
      </select>
    </div>

    <div class="row">
      <button id="startBtn">START</button>
      <button id="stopBtn">STOP</button>
    </div>

    <div class="row single">
      <button id="playBtn">PLAY</button>
    </div>

    <div class="row">
      <button id="pauseBtn">PAUSE</button>
      <button id="resumeBtn">RESUME</button>
    </div>

    <div class="status" id="status">ᓚᘏᗢ</div>

    <div class="box">
  <div class="boxHeader" id="editToggle">
    <span>✎</span>
    <small id="editState">OFF</small>
  </div>

  <!-- Empty state overlay -->
  <div id="emptyState" aria-hidden="true">
    <img src="./micro.png" alt="" draggable="false" />
    <div class="emptyText">Your speech blooms here</div>
  </div>

  <textarea 
    id="text" 
    readonly
    spellcheck="false"
    autocorrect="off"
    autocomplete="off"
    autocapitalize="off"
  ></textarea>
</div>

  </div>

<script>
  (() => {
    // ---------- UI ----------
    const langEl = document.getElementById('lang');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const statusEl = document.getElementById('status');
    const textEl = document.getElementById('text');
    const editToggle = document.getElementById('editToggle');
    const editState = document.getElementById('editState');
    const emptyStateEl = document.getElementById("emptyState");

    let isComposing = false;
    let committedText = "";
    let interimText = "";
    let lastFinalText = "";
    let recState = "idle";
    let shouldClearOnNextStart = true;
    let manualEnd = false;
    let userPinnedToBottom = true;

    // Force le chargement des voix dès le chargement de la page
window.speechSynthesis.onvoiceschanged = () => {
  console.log("Voix chargées :", window.speechSynthesis.getVoices().length);
};
    
    textEl.addEventListener("compositionstart", () => { isComposing = true; });
    textEl.addEventListener("compositionend", () => { isComposing = false; });
    
    textEl.addEventListener("input", () => {
      if (!textEl.readOnly) {
        committedText = textEl.value;
      }
    });

    function updateEmptyState() {
      const hasText = normalize(textEl.value).length > 0;
      const show = !hasText && textEl.readOnly;
      emptyStateEl.style.display = show ? "flex" : "none";
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    function isNearBottom(el, threshold = 24) {
      return (el.scrollHeight - el.scrollTop - el.clientHeight) < threshold;
    }

    textEl.addEventListener("scroll", () => {
      userPinnedToBottom = isNearBottom(textEl);
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recog = null;

    // --- Fonctions de nettoyage pour éviter les doublons avec apostrophes ---
    function normalize(s) {
      return (s || "").replace(/\s+/g, " ").trim();
    }

    function cleanForComparison(s) {
      // Enlève ponctuation, apostrophes et met en minuscule pour comparer le contenu pur
      return s.toLowerCase()
              .replace(/['’'"`.,\/#!$%\^&\*;:{}=\-_`~()]/g, "")
              .replace(/\s+/g, "")
              .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function appendDeltaFromFinal(finalTextRaw) {
      const finalText = normalize(finalTextRaw);
      if (!finalText) return;

      const cleanNew = cleanForComparison(finalText);
      const cleanLast = cleanForComparison(lastFinalText);

      // Si le nouveau texte contient l'ancien (cas Android progressif)
      if (cleanLast && cleanNew.startsWith(cleanLast)) {
        const addition = finalText.slice(lastFinalText.length).trim();
        if (addition) {
          // On vérifie si l'addition ne commence pas par une apostrophe collée
          const space = (committedText.length > 0 && !/[\s'’]/.test(committedText.slice(-1))) ? " " : "";
          committedText += space + addition;
        }
      } 
      // Si c'est un tout nouveau bloc de texte
      else if (cleanNew !== cleanLast) {
        const space = (committedText.length > 0 && !/[\s'’]/.test(committedText.slice(-1))) ? " " : "";
        committedText += space + finalText;
      }

      lastFinalText = finalText;
    }

    function renderTranscript() {
      const shouldStick = userPinnedToBottom && textEl.readOnly;
      textEl.value = (committedText + interimText).trimStart();
      if (shouldStick) textEl.scrollTop = textEl.scrollHeight;
      updateEmptyState();
    }

    async function commitTextareaToCommitted() {
      return new Promise((resolve) => {
        const doCommit = () => {
          committedText = textEl.value;
          interimText = "";
          lastFinalText = "";
          renderTranscript();
          resolve();
        };
        if (document.activeElement === textEl) textEl.blur();
        setTimeout(doCommit, 50);
      });
    }

    function ensureRecognition() {
      if (!SpeechRecognition) return null;
      if (recog) return recog;

      recog = new SpeechRecognition();
      recog.lang = langEl.value;
      recog.continuous = true;
      recog.interimResults = true;
      recog.maxAlternatives = 1;

      recog.onresult = (event) => {
        if (recState !== "listening") return;
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          const t = r[0]?.transcript ?? "";
          if (!t) continue;
          if (r.isFinal) appendDeltaFromFinal(t);
          else interim += t;
        }
        interimText = interim;
        renderTranscript();
      };

      recog.onerror = (e) => {
        if (e.error === 'no-speech') return;
        setStatus(`Error: ${e.error}`);
      };

      recog.onend = () => {
        if (recState === "listening" && !manualEnd) {
          try { recog.start(); } catch (_) {}
        }
        manualEnd = false;
      };

      return recog;
    }

    function startRecognition({ clear }) {
      const r = ensureRecognition();
      if (!r) {
        setStatus("Not supported.");
        return;
      }
      
      lastFinalText = "";
      r.lang = langEl.value;

      if (clear) {
        committedText = "";
        interimText = "";
        renderTranscript();
      }

      userPinnedToBottom = true;
      recState = "listening";
      manualEnd = false;
      
      setStatus("Starting..."); // Indique que le moteur chauffe
      
      try { 
        r.start(); 
        // Petit délai pour laisser le micro s'ouvrir réellement avant de parler
        setTimeout(() => { if(recState === "listening") setStatus("Listening..."); }, 400);
      } catch (_) {
        setStatus("Listening...");
      }
    }

    function pauseRecognition() {
      if (!recog) return;
      manualEnd = true;
      recState = "idle";
      try { recog.stop(); } catch (_) {}
      interimText = "";
      renderTranscript();
      setStatus("Paused.");
    }

    function stopRecognitionAndClear() {
      if (recog) {
        manualEnd = true;
        try { recog.stop(); } catch (_) {}
      }
      recState = "idle";
      committedText = "";
      interimText = "";
      lastFinalText = "";
      renderTranscript();
      setStatus("⋆.˚ ☾⭒.˚");
      shouldClearOnNextStart = true;
    }

    // ---------- TTS ----------
    function getSelectedOrAllText() {
      const start = textEl.selectionStart;
      const end = textEl.selectionEnd;
      if (typeof start === "number" && typeof end === "number" && end > start) {
        return textEl.value.slice(start, end);
      }
      return textEl.value;
    }

    // ---------- TTS AMÉLIORÉ ----------
function speakText(text) {
  if (!text.trim()) return;
  window.speechSynthesis.cancel();
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = langEl.value;

  // Fonction pour définir la voix
  const setVoice = () => {
    const voices = window.speechSynthesis.getVoices();
    // On cherche une voix qui correspond à la langue
    const selectedVoice = voices.find(v => v.lang.startsWith(langEl.value)) || 
                          voices.find(v => v.lang.startsWith(langEl.value.split('-')[0])) || 
                          voices[0];
    if (selectedVoice) u.voice = selectedVoice;
  };

  // Essayer immédiatement
  setVoice();

  u.onstart = () => { playBtn.textContent = "STOP"; setStatus("Speaking..."); };
  u.onend = () => { playBtn.textContent = "PLAY"; setStatus("ᓚᘏᗢ"); };
  u.onerror = (e) => { 
    console.error("Speech Error:", e);
    setStatus("Error."); 
    playBtn.textContent = "PLAY";
  };
  
  window.speechSynthesis.speak(u);
}

    // ---------- Events ----------
    startBtn.onclick = async () => {
      const clear = shouldClearOnNextStart;
      shouldClearOnNextStart = false;
      if (!textEl.readOnly) await commitTextareaToCommitted();
      startRecognition({ clear });
    };

    stopBtn.onclick = () => {
      stopRecognitionAndClear();
      window.speechSynthesis.cancel();
      playBtn.textContent = "PLAY";
    };

    pauseBtn.onclick = () => {
      if (recState === "listening") pauseRecognition();
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.pause();
        setStatus("Paused.");
      }
    };

    // Remplacez votre bloc resumeBtn.onclick par celui-ci :
      resumeBtn.onclick = async () => {
        // 1. Si on était en train d'éditer, on enregistre les modifs manuelles
        if (!textEl.readOnly) await commitTextareaToCommitted();
        
        // 2. Si la synthèse vocale était en pause, on la reprend
        if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
          setStatus("Speaking...");
        }
      
        // 3. RECONNAISSANCE VOCALE : 
        // On force 'clear: false' de manière EXPLICITE ici
        if (recState !== "listening") {
          startRecognition({ clear: false }); 
        }
      };

    playBtn.onclick = () => {
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        playBtn.textContent = "PLAY";
        setStatus(recState === "listening" ? "Listening..." : "ᓚᘏᗢ");
        return;
      }
      speakText(getSelectedOrAllText());
    };

    editToggle.onclick = async () => {
      const wasListening = (recState === "listening");
      if (!textEl.readOnly) {
        // Closing Edit Mode
        await commitTextareaToCommitted();
        textEl.readOnly = true;
        editState.textContent = "OFF";
      } else {
        // Opening Edit Mode
        if (wasListening) pauseRecognition();
        textEl.readOnly = false;
        editState.textContent = "ON";
        requestAnimationFrame(() => {
          textEl.focus();
          textEl.setSelectionRange(textEl.value.length, textEl.value.length);
        });
      }
      updateEmptyState();
    };

    setStatus("ᓚᘏᗢ");
    updateEmptyState();
  })();
</script>
</body>
</html>
